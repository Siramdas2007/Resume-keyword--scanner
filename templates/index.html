<!DOCTYPE html>
<html>
<head>

<title>Resume Keyword Scanner</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:400px;
text-align:center;
}

textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:#4facfe;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Resume Keyword Scanner</h2>

<form action="/scan" method="POST" enctype="multipart/form-data">

<input type="file" name="resume" required><br><br>

<textarea name="job_description" rows="5"
placeholder="Enter Job Description" required></textarea>

<br>

<button type="submit">Scan Resume</button>

</form>

</div>

</body>
</html>
