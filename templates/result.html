<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Scan Result</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;

}

body{

background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.container{

background:white;
padding:40px;
border-radius:15px;
width:700px;
max-width:90%;
box-shadow:0 15px 40px rgba(0,0,0,0.2);

}

h1{

text-align:center;
margin-bottom:20px;
color:#333;

}

.score{

text-align:center;
margin-bottom:20px;

}

.progress{

width:100%;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:10px;

}

.bar{

height:22px;
background:linear-gradient(90deg,#28a745,#5cd65c);
text-align:center;
color:white;
font-size:13px;
line-height:22px;

}

.keyword-section{

display:flex;
gap:20px;
margin-top:25px;
flex-wrap:wrap;

}

.box{

flex:1;
min-width:250px;
padding:20px;
border-radius:10px;
background:#f9f9f9;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

.box h3{

margin-bottom:10px;

}

.matched h3{

color:#28a745;

}

.missing h3{

color:#dc3545;

}

.skills{

display:flex;
flex-wrap:wrap;
gap:8px;

}

.skill{

padding:6px 12px;
border-radius:20px;
font-size:13px;

}

.good{

background:#d4edda;
color:#155724;

}

.bad{

background:#f8d7da;
color:#721c24;

}

.back{

margin-top:25px;
text-align:center;

}

button{

padding:10px 20px;
border:none;
background:#667eea;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;

}

button:hover{

background:#4f5bd5;

}
.suggestions{

margin-top:25px;
background:#fff3cd;
padding:15px;
border-radius:10px;
border-left:5px solid #ffc107;

}

.suggestions h3{

color:#856404;
margin-bottom:10px;

}

.suggestions li{

margin:6px 0;

}

</style>

</head>

<body>

<div class="container">

<h1>Resume Scan Result</h1>

<div class="score">

<h2>Match Score: {{match}}%</h2>

<div class="progress">
<div class="bar" style="width:{{match}}%">{{match}}%</div>
</div>

</div>

<div class="keyword-section">

<div class="box matched">

<h3>Matched Keywords</h3>

<div class="skills">

{% for word in matched %}
<span class="skill good">{{word}}</span>
{% endfor %}

</div>

</div>

<div class="box missing">

<h3>Missing Keywords</h3>

<div class="skills">

{% for word in missing %}
<span class="skill bad">{{word}}</span>
{% endfor %}

</div>
<div class="box suggestions">

<h3>Suggestions to Improve Resume</h3>

<ul>

{% for tip in suggestions %}
<li>{{tip}}</li>
{% endfor %}

</ul>

</div>

</div>

</div>

<div class="back">

<a href="/">
<button>Scan Another Resume</button>
</a>

</div>

</div>

</body>
</html>
